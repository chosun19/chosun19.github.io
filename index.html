<script>
// Floating particles
(function() {
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let w, h, particles = [];

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight * 3;
    }
    resize();
    window.addEventListener('resize', resize);

    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * w;
            this.y = Math.random() * h;
            this.size = Math.random() * 2 + 0.5;
            this.speedX = (Math.random() - 0.5) * 0.3;
            this.speedY = -(Math.random() * 0.3 + 0.1);
            this.opacity = Math.random() * 0.3 + 0.05;
            this.fadeSpeed = Math.random() * 0.003 + 0.001;
            this.growing = Math.random() > 0.5;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.growing) {
                this.opacity += this.fadeSpeed;
                if (this.opacity >= 0.35) this.growing = false;
            } else {
                this.opacity -= this.fadeSpeed;
                if (this.opacity <= 0.02) this.reset();
            }
            if (this.y < -10 || this.x < -10 || this.x > w + 10) this.reset();
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(201, 169, 110, ${this.opacity})`;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(201, 169, 110, ${this.opacity * 0.15})`;
            ctx.fill();
        }
    }

    for (let i = 0; i < 50; i++) particles.push(new Particle());

    function animate() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();
})();
</script>

                                    <div className="project-card-body">
                                        <div className="project-card-header"><div><h3 className="project-card-title">{edu.school}</h3><div className="project-card-role">{edu.major} &middot; {edu.type}</div></div><div className="project-card-period">{edu.period}</div></div>
                                        {edu.gpa && <div className="project-card-footer" style={{marginTop: '8px'}}><div className="project-card-tags"><span className="project-card-tag">학점 {edu.gpa}</span></div></div>}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>

                <div className="section-divider"><div className="section-divider-line"></div><div className="section-divider-diamond"></div><div className="section-divider-line"></div></div>

                <section className="section" id="contact">
                    <div className="section-container">
                        <div className="section-header-full fade-in"><div className="section-tag">Get In Touch</div><h2 className="section-title">연락처</h2></div>
                        <div className="contact-grid"><a href="mailto:cho*****@naver.com" className="contact-card fade-in"><span className="contact-emoji">&#9993;</span><div className="contact-type">Email</div><div className="contact-info">cho*****@naver.com</div></a><a href="tel:010-****-5692" className="contact-card fade-in" style={{transitionDelay: '0.1s'}}><span className="contact-emoji">&#128241;</span><div className="contact-type">Phone</div><div className="contact-info">010-****-5692</div></a><div className="contact-card fade-in" style={{transitionDelay: '0.2s'}}><span className="contact-emoji">&#128205;</span><div className="contact-type">Address</div><div className="contact-info">서울 구로구 신도림로</div></div></div>
                    </div>
                </section>

                <footer><div className="section-container"><p className="footer-text">&copy; 2026 Kiwoong Hong. All rights reserved.</p></div></footer>
                </>
                )}
            </>
        );
    };

    ReactDOM.render(<Portfolio />, document.getElementById('root'));
</script>
